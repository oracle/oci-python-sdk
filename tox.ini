[tox]
envlist = py36, py37, py38, py39, flake8

[testenv]
passenv = PYTHON_TESTS_ADMIN_PASS_PHRASE OCI_PYSDK*
setenv = PYTEST_DISABLE_PLUGIN_AUTOLOAD=1
deps = -r{toxinidir}/requirements.txt
commands =
    py.test -p pytest_cov.plugin tests/autogentest tests/unit tests/integ [] -s

[testenv:flake8]
commands = flake8 src docs tests examples --exclude src/oci/_vendor,docs/conf.py